<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Link</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <i class="fa-solid fa-shield-heart"></i>
      <span>FamilyLink</span>
    </div>
    <nav class="nav-links">
      <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-map-location-dot"></i> Live Map</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-bell"></i> Alerts</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <img src="https://i.pravatar.cc/40?img=12" alt="Parent" class="avatar"/>
      <div>
        <p class="parent-name">Parent Account</p>
        <p class="parent-sub">Admin</p>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h1>Dashboard <span class="wave">👋</span></h1>
        <p class="subtitle">Monitor your children in real-time</p>
      </div>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search child by name..." oninput="searchChildren()"/>
        <button class="btn-search" onclick="searchChildren()">Search</button>
      </div>
    </header>

    <!-- STATS ROW -->
    <div class="stats-row">
      <div class="stat-card">
        <i class="fa-solid fa-users"></i>
        <div>
          <p class="stat-num" id="totalCount">4</p>
          <p class="stat-label">Total Children</p>
        </div>
      </div>
      <div class="stat-card online">
        <i class="fa-solid fa-circle-check"></i>
        <div>
          <p class="stat-num" id="onlineCount">0</p>
          <p class="stat-label">Online Now</p>
        </div>
      </div>
      <div class="stat-card locked">
        <i class="fa-solid fa-lock"></i>
        <div>
          <p class="stat-num" id="lockedCount">0</p>
          <p class="stat-label">Phones Locked</p>
        </div>
      </div>
      <div class="stat-card alert">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <div>
          <p class="stat-num">0</p>
          <p class="stat-label">Active Alerts</p>
        </div>
      </div>
    </div>

    <!-- DASHBOARD GRID -->
    <div class="dashboard-grid">

      <!-- LEFT: CHILDREN CARDS -->
      <section class="children-section">
        <div class="section-header">
          <h2>Children</h2>
          <button class="btn-add" onclick="addChild()"><i class="fa-solid fa-plus"></i> Add Child</button>
        </div>
        <div id="childrenContainer" class="children-container"></div>
        <div id="noResults" class="no-results hidden">
          <i class="fa-solid fa-magnifying-glass"></i>
          <p>No children found matching your search.</p>
        </div>
      </section>

      <!-- RIGHT: MAP -->
      <section class="map-section">
        <div class="section-header">
          <h2>Live Map</h2>
          <span class="live-badge"><i class="fa-solid fa-circle"></i> LIVE</span>
        </div>
        <div id="map" class="map-container"></div>
        <div class="map-legend">
          <span><i class="fa-solid fa-circle" style="color:#4ade80"></i> Online</span>
          <span><i class="fa-solid fa-circle" style="color:#f87171"></i> Offline</span>
          <span><i class="fa-solid fa-circle" style="color:#facc15"></i> Locked</span>
        </div>
      </section>

    </div>
  </main>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modalTitle">Notification</h3>
      <p id="modalMessage"></p>
      <button class="btn-close-modal" onclick="closeModal()">OK</button>
    </div>
  </div>

  <!-- Google Maps API - replace YOUR_API_KEY with your actual key -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU_DpA3VC1zdc9WDYKnmH40vYjjovOoKI&callback=initMap" async defer></script>
  <script src="script.js"></script>
</body>
</html>
